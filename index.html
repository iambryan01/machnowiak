<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MACHNOWIAK 2.0 ULTIMATE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f0c29; --accent: #3498db; --gold: #f1c40f; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 220px; background: rgba(0,0,0,0.6); border-right: 2px solid var(--accent); padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .player-card { background: rgba(255,255,255,0.05); padding: 10px; margin: 5px 0; border-radius: 8px; border-left: 4px solid transparent; }
        .player-card.active { border-left-color: var(--gold); background: rgba(241, 196, 15, 0.1); }
        .sks-tag { font-size: 0.7rem; color: #888; font-style: italic; }

        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; position: relative; }
        .btn-new-game { position: absolute; top: 10px; right: 10px; background: #8e44ad; color: white; padding: 8px 15px; font-size: 0.8rem; cursor: pointer; border: none; border-radius: 5px; }

        /* NAPRAWA STOŁU */
        #stół { 
            background: rgba(255,255,255,0.03); 
            width: 90%; 
            height: 400px; 
            border-radius: 30px; 
            border: 2px dashed #444; 
            display: flex; 
            flex-direction: row; 
            justify-content: center; 
            align-items: flex-start; 
            gap: 80px; 
            margin: 20px; 
            padding-top: 80px; 
            position: relative;
        }

        .card-stack { position: relative; width: 90px; height: 130px; }
        .stack-info { 
            position: absolute; top: -70px; width: 150px; left: 50%; transform: translateX(-50%);
            text-align: center; color: var(--gold); font-weight: bold; font-size: 1rem;
            background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; pointer-events: none;
        }

        .karta { 
            width: 90px; height: 130px; background: white; color: black; border-radius: 10px; 
            border: 2px solid #222; position: absolute; cursor: pointer; transition: 0.2s;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        }
        .karta .val-top { position: absolute; top: 5px; left: 8px; font-weight: 900; font-size: 1.2rem; }
        .karta .suit-top { position: absolute; top: 25px; left: 8px; font-size: 0.9rem; }
        .karta.red { color: var(--danger); }
        .karta.zakryta { background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d); color: transparent; border-color: white; }

        /* Odstępy kart w stosie */
        .karta:nth-child(2) { top: 35px; z-index: 1; }
        .karta:nth-child(3) { top: 70px; z-index: 2; }
        .karta:nth-child(4) { top: 105px; z-index: 3; }
        .karta:nth-child(5) { top: 140px; z-index: 4; }

        #reka { display: flex; gap: 10px; padding: 20px; min-height: 160px; justify-content: center; width: 100%; }
        #reka .karta { position: relative; top: 0 !important; }

        #pick-menu, #target-menu, #sks-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2e; border: 4px solid var(--gold); padding: 30px; border-radius: 20px; z-index: 3000; box-shadow: 0 0 100px rgba(0,0,0,0.9); text-align: center; }
        
        button { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start { background: #27ae60; color: white; }
        .btn-blef { background: var(--danger); color: white; }
        .btn-sks { background: var(--gold); color: #000; }
        .btn-no { background: #7f8c8d; color: white; margin-left: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>👥 GRACZE</h2>
        <div id="player-list"></div>
    </div>

    <div id="game-area">
        <button class="btn-new-game" onclick="socket.emit('new-game-request')">NOWA GRA (RESET)</button>
        <h1>⚔️ MACHNOWIAK 2.0</h1>
        <div id="status" style="color:var(--gold)">Czekaj na start...</div>
        
        <div id="stół"></div>

        <div class="controls">
            <button id="start-btn" class="btn-start" onclick="socket.emit('start-game')">START GRY</button>
            <button class="btn-blef" onclick="socket.emit('check-blef')">SPRAWDZAM BLEF!</button>
        </div>

        <div id="sks-modal">
            <h2>🔥 SKS?</h2>
            <p>Użyć SKS w tej turze?<br><small>(Raz na grę)</small></p>
            <button class="btn-sks" onclick="confirmSKS(true)">TAK</button>
            <button class="btn-no" onclick="confirmSKS(false)">NIE</button>
        </div>

        <div id="pick-menu">
            <h2 id="pick-title">Wybierz karty:</h2>
            <div id="pick-cards-grid" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;"></div>
        </div>

        <div id="target-menu">
            <h2>🎯 Wybierz ofiarę:</h2>
            <div id="target-list" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <h3>TWOJA RĘKA:</h3>
        <div id="reka"></div>
    </div>

    <script>
        const socket = io();
        let selectedForPick = [];
        let mySksUsed = false;

        window.onload = () => {
            const nick = prompt("Twój Nick:");
            if(nick) socket.emit('join', nick);
        };

        socket.on('update-player-list', list => {
            document.getElementById('player-list').innerHTML = list.map(p => `
                <div class="player-card ${p.isCurrent ? 'active' : ''}">
                    <strong>${p.name}</strong><br>Karty: ${p.count}
                    ${p.sksUsed ? '<br><span class="sks-tag">SKS zużyty</span>' : ''}
                </div>
            `).join('');
        });

        socket.on('init-hand', hand => {
            const reka = document.getElementById('reka');
            reka.innerHTML = '';
            hand.forEach(k => {
                const div = createCardElement(k);
                div.onclick = () => socket.emit('play-card', k);
                reka.appendChild(div);
            });
        });

        function createCardElement(k) {
            const div = document.createElement('div');
            const isRed = k.suit === '♥' || k.suit === '♦';
            div.className = `karta ${isRed ? 'red' : ''}`;
            div.innerHTML = `<span class="val-top">${k.value}</span><span class="suit-top">${k.value === 'Joker' ? '🃏' : k.suit}</span>`;
            return div;
        }

        socket.on('reveal-detailed', data => {
            const stol = document.getElementById('stół');
            stol.innerHTML = '';
            data.forEach(p => {
                const stack = document.createElement('div');
                stack.className = 'card-stack';
                const info = document.createElement('div');
                info.className = 'stack-info';
                info.innerHTML = `${p.name}<br>${p.finalPower} pkt`;
                stack.appendChild(info);

                p.cards.forEach(c => stack.appendChild(createCardElement(c)));
                stol.appendChild(stack);
            });
        });

        socket.on('show-sks-modal', () => {
            if (!mySksUsed) document.getElementById('sks-modal').style.display = 'block';
        });

        function confirmSKS(choice) {
            if (choice) { socket.emit('use-sks'); mySksUsed = true; }
            document.getElementById('sks-modal').style.display = 'none';
        }

        socket.on('reveal-bula', bulaData => {
            let msg = bulaData.map(b => `${b.name} dobrał: ${b.cards.map(c => c.value + c.suit).join(', ')}`).join('\n');
            alert("⚔️ BUŁA!\n" + msg);
        });

        socket.on('card-placed', () => {
            const stol = document.getElementById('stół');
            const card = document.createElement('div');
            card.className = 'karta zakryta';
            card.style.position = 'relative'; // Tymczasowo dla efektu czekania
            stol.appendChild(card);
        });

        socket.on('clear-table', () => { 
            document.getElementById('stół').innerHTML = ''; 
            mySksUsed = false; 
        });
        
        socket.on('update-status', msg => document.getElementById('status').innerText = msg);
        socket.on('game-begun', () => document.getElementById('start-btn').style.display = 'none');

        socket.on('show-pick-menu', data => {
            const menu = document.getElementById('pick-menu');
            const grid = document.getElementById('pick-cards-grid');
            menu.style.display = 'block';
            grid.innerHTML = '';
            selectedForPick = [];
            data.pool.forEach(k => {
                const div = createCardElement(k);
                div.onclick = () => {
                    div.style.border = '4px solid gold';
                    selectedForPick.push(k);
                    if (selectedForPick.length === data.count) {
                        socket.emit('pick-finished', { pickedCards: selectedForPick, targetIdx: data.targetIdx });
                        menu.style.display = 'none';
                    }
                };
                grid.appendChild(div);
            });
        });

        socket.on('show-target-menu', targets => {
            const menu = document.getElementById('target-menu');
            const list = document.getElementById('target-list');
            menu.style.display = 'block';
            list.innerHTML = '';
            targets.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-sks';
                btn.innerText = t;
                btn.onclick = () => { socket.emit('target-selected', t); menu.style.display = 'none'; };
                list.appendChild(btn);
            });
        });
    </script>
</body>
</html>
