<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MACHNOWIAK 2.0</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; text-align: center; }
        #stół { background: #16213e; min-height: 180px; margin: 20px auto; display: flex; justify-content: center; align-items: center; gap: 10px; border-radius: 15px; width: 90%; }
        .karta { width: 70px; height: 100px; background: white; color: black; border-radius: 8px; line-height: 100px; font-weight: bold; cursor: pointer; border: 2px solid #000; position: relative; }
        .zakryta { background: #0f3460; color: #0f3460; border: 2px solid #00d2ff; }
        .red { color: #e94560; }
        #reka { display: flex; justify-content: center; gap: 10px; margin-top: 30px; flex-wrap: wrap; }
        #status { font-size: 1.2em; color: #00d2ff; margin: 20px; }
        .owner { font-size: 10px; position: absolute; bottom: 5px; width: 100%; left: 0; color: #555; }
    </style>
</head>
<body>
    <h1>🎴 MACHNOWIAK 2.0</h1>
    <div id="status">Czekaj na innych...</div>
    <button id="start-btn" onclick="socket.emit('start-game')">START GRY</button>
    
    <div id="stół"></div>
    <h3>TWOJE KARTY:</h3>
    <div id="reka"></div>

    <script>
        const socket = io();
        const nick = prompt("Nick:");
        socket.emit('join', nick);

        socket.on('init-hand', hand => {
            const reka = document.getElementById('reka');
            reka.innerHTML = '';
            hand.forEach(k => {
                const div = document.createElement('div');
                div.className = `karta ${(k.suit === '♥' || k.suit === '♦') ? 'red' : ''}`;
                div.innerHTML = `${k.value}${k.suit === 'Joker' ? '🃏' : k.suit}`;
                div.onclick = () => socket.emit('play-card', k);
                reka.appendChild(div);
            });
        });

        socket.on('card-placed', data => {
            const stol = document.getElementById('stół');
            const div = document.createElement('div');
            div.className = 'karta zakryta';
            div.innerHTML = `?<div class="owner">${data.playerName}</div>`;
            stol.appendChild(div);
        });

        socket.on('reveal-cards', cards => {
            const stol = document.getElementById('stół');
            stol.innerHTML = '';
            cards.forEach(m => {
                const div = document.createElement('div');
                const isRed = (m.card.suit === '♥' || m.card.suit === '♦');
                div.className = `karta ${isRed ? 'red' : ''}`;
                div.innerHTML = `${m.card.value}${m.card.suit === 'Joker' ? '🃏' : m.card.suit}<div class="owner">${m.playerName}</div>`;
                stol.appendChild(div);
            });
        });

        socket.on('update-status', msg => document.getElementById('status').innerText = msg);
        socket.on('clear-table', () => document.getElementById('stół').innerHTML = '');
        socket.on('game-begun', () => document.getElementById('start-btn').style.display = 'none');
    </script>
</body>
</html>
