<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MACHNOWIAK 2.0</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f0c29; --accent: #3498db; --gold: #f1c40f; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 220px; background: rgba(0,0,0,0.8); border-right: 2px solid var(--accent); padding: 20px; display: flex; flex-direction: column; }
        .player-card { background: rgba(255,255,255,0.05); padding: 10px; margin: 5px 0; border-radius: 8px; border-left: 4px solid transparent; }
        .player-card.active { border-left-color: var(--gold); }

        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        
        #stół { 
            background: rgba(255,255,255,0.03); width: 95%; height: 420px; border-radius: 30px; 
            border: 2px dashed #444; display: flex; justify-content: center; align-items: flex-start; 
            gap: 60px; padding-top: 80px; position: relative;
        }

        .card-stack { position: relative; width: 90px; height: 130px; transition: 0.3s; }
        .stack-info { position: absolute; top: -70px; width: 140px; left: 50%; transform: translateX(-50%); text-align: center; color: var(--gold); font-weight: bold; }

        .karta { 
            width: 90px; height: 130px; background: white; color: black; border-radius: 10px; 
            border: 2px solid #222; position: absolute; box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; padding: 5px; box-sizing: border-box;
        }
        .karta .val { font-weight: 900; font-size: 1.3rem; }
        .karta.red { color: var(--danger); }
        .karta.zakryta { background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d); color: transparent; border: 1px solid white; }

        /* Stosowanie kart */
        .karta:nth-child(2) { top: 30px; } .karta:nth-child(3) { top: 60px; } 
        .karta:nth-child(4) { top: 90px; } .karta:nth-child(5) { top: 120px; }

        /* NOWA SEKCJA DOLNA */
        #bottom-panel { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; padding: 10px; margin-top: auto; }

        #sks-panel { 
            display: none; background: rgba(241, 196, 15, 0.15); border: 2px solid var(--gold); 
            padding: 15px; border-radius: 15px; text-align: center; min-width: 150px;
        }
        #sks-panel h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--gold); }
        #sks-panel p { margin: 0 0 10px 0; font-size: 0.7rem; opacity: 0.8; }

        #reka-container { flex-grow: 1; text-align: center; }
        #reka { display: flex; gap: 10px; padding: 10px; flex-wrap: wrap; justify-content: center; min-height: 140px; }
        #reka .karta { position: relative; cursor: pointer; transition: 0.2s; top: 0 !important; }

        .controls { position: absolute; bottom: 200px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start { background: #27ae60; color: white; }
        .btn-blef { background: var(--danger); color: white; }
        .btn-sks-yes { background: var(--gold); color: black; padding: 8px 15px; }
        .btn-sks-no { background: #555; color: white; padding: 8px 15px; }
        .btn-reset { position: absolute; top: 10px; right: 10px; background: #8e44ad; color: white; }

        #pick-menu, #target-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2e; border: 3px solid var(--gold); padding: 20px; border-radius: 15px; z-index: 6000; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>👥 GRACZE</h2>
        <div id="player-list"></div>
    </div>

    <div id="game-area">
        <button class="btn-reset" onclick="socket.emit('new-game-request')">NOWA GRA (RESET)</button>
        <h1>⚔️ MACHNOWIAK 2.0</h1>
        <h2 id="status" style="color:var(--gold); height: 30px;"></h2>
        
        <div id="stół"></div>

        <div class="controls">
            <button id="start-btn" class="btn-start" onclick="socket.emit('start-game')">START GRY</button>
            <button id="blef-btn" class="btn-blef" onclick="socket.emit('check-blef')">SPRAWDZAM BLEF!</button>
        </div>

        <div id="bottom-panel">
            <div id="sks-panel">
                <h3>🔥 UŻYĆ SKS?</h3>
                <p>(Możliwe raz na całą grę)</p>
                <button class="btn-sks-yes" onclick="sendSks(true)">TAK</button>
                <button class="btn-sks-no" onclick="sendSks(false)">NIE</button>
            </div>

            <div id="reka-container">
                <h3>TWOJA RĘKA:</h3>
                <div id="reka"></div>
            </div>
        </div>

        <div id="pick-menu">
            <h3 id="pick-title"></h3>
            <div id="pick-cards-grid" style="display:flex; gap:10px;"></div>
        </div>

        <div id="target-menu">
            <h3>🎯 Wybierz cel:</h3>
            <div id="target-list" style="display:flex; flex-direction:column; gap:5px;"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let mySksUsedLocally = false;

        window.onload = () => {
            const nick = prompt("Twój Nick:");
            if(nick) socket.emit('join', nick);
        };

        socket.on('update-player-list', list => {
            document.getElementById('player-list').innerHTML = list.map(p => `
                <div class="player-card ${p.isCurrent ? 'active' : ''}">
                    <strong>${p.name}</strong><br>Karty: ${p.count} ${p.sksUsed ? '🚫' : ''}
                </div>
            `).join('');
        });

        socket.on('update-table-hidden', data => {
            const stol = document.getElementById('stół');
            stol.innerHTML = '';
            data.forEach(p => {
                const stack = document.createElement('div');
                stack.className = 'card-stack';
                stack.innerHTML = `<div class="stack-info">${p.playerName}</div>`;
                if (p.cards === null) {
                    const rev = document.createElement('div');
                    rev.className = 'karta zakryta';
                    stack.appendChild(rev);
                } else {
                    p.cards.forEach(c => stack.appendChild(createCardElement(c)));
                }
                stol.appendChild(stack);
            });
        });

        socket.on('reveal-detailed', data => {
            const stol = document.getElementById('stół');
            stol.innerHTML = '';
            data.forEach(p => {
                const stack = document.createElement('div');
                stack.className = 'card-stack';
                stack.innerHTML = `<div class="stack-info">${p.name}<br>${p.finalPower} pkt</div>`;
                p.cards.forEach(c => stack.appendChild(createCardElement(c)));
                stol.appendChild(stack);
            });
        });

        function createCardElement(k) {
            const div = document.createElement('div');
            const isRed = k.suit === '♥' || k.suit === '♦';
            div.className = `karta ${isRed ? 'red' : ''}`;
            div.innerHTML = `<span class="val">${k.value}</span><span>${k.value === 'Joker' ? '🃏' : k.suit}</span>`;
            return div;
        }

        socket.on('init-hand', hand => {
            const reka = document.getElementById('reka');
            reka.innerHTML = '';
            hand.forEach(k => {
                const div = createCardElement(k);
                div.onclick = () => socket.emit('play-card', k);
                reka.appendChild(div);
            });
        });

        socket.on('show-sks-modal', () => {
            if (!mySksUsedLocally) document.getElementById('sks-panel').style.display = 'block';
            else socket.emit('sks-decision', false); // Jeśli zużyty, automatycznie wysyła NIE
        });

        function sendSks(v) {
            if(v) mySksUsedLocally = true;
            socket.emit('sks-decision', v);
            document.getElementById('sks-panel').style.display = 'none';
        }

        socket.on('update-status', msg => document.getElementById('status').innerText = msg);
        socket.on('clear-table', () => document.getElementById('stół').innerHTML = '');
        
        socket.on('game-begun', () => document.getElementById('start-btn').style.display = 'none');
        socket.on('reset-client-ui', () => {
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('stół').innerHTML = '';
            document.getElementById('reka').innerHTML = '';
            document.getElementById('status').innerText = "Czekaj na start...";
            mySksUsedLocally = false;
        });

        socket.on('show-pick-menu', data => {
            const menu = document.getElementById('pick-menu');
            const grid = document.getElementById('pick-cards-grid');
            document.getElementById('pick-title').innerText = data.title;
            menu.style.display = 'block'; grid.innerHTML = '';
            let selected = [];
            data.pool.forEach(k => {
                const d = createCardElement(k);
                d.onclick = () => {
                    d.style.border = "3px solid gold"; selected.push(k);
                    if(selected.length === data.count) {
                        socket.emit('pick-finished', { pickedCards: selected, targetIdx: data.targetIdx });
                        menu.style.display = 'none';
                    }
                };
                grid.appendChild(d);
            });
        });

        socket.on('show-target-menu', targets => {
            const menu = document.getElementById('target-menu');
            const list = document.getElementById('target-list');
            menu.style.display = 'block'; list.innerHTML = '';
            targets.forEach(t => {
                const b = document.createElement('button');
                b.innerText = t; b.className = "btn-start";
                b.onclick = () => { socket.emit('target-selected', t); menu.style.display = 'none'; };
                list.appendChild(b);
            });
        });
    </script>
</body>
</html>
