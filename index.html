<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MACHNOWIAK 2.0 ULTIMATE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f0c29; --accent: #3498db; --gold: #f1c40f; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 220px; background: rgba(0,0,0,0.6); border-right: 2px solid var(--accent); padding: 20px; display: flex; flex-direction: column; }
        .player-card { background: rgba(255,255,255,0.05); padding: 10px; margin: 5px 0; border-radius: 8px; border-left: 4px solid transparent; }
        .player-card.active { border-left-color: var(--gold); background: rgba(241, 196, 15, 0.1); }

        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; position: relative; }
        #stół { background: rgba(255,255,255,0.03); width: 90%; min-height: 300px; border-radius: 30px; border: 2px dashed #444; display: flex; justify-content: center; align-items: center; gap: 40px; margin: 20px; }

        .karta { 
            width: 90px; height: 130px; background: white; color: black; border-radius: 10px; 
            border: 2px solid #222; position: relative; cursor: pointer; transition: 0.2s;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .karta .val-top { position: absolute; top: 5px; left: 8px; font-weight: 900; font-size: 1.2rem; }
        .karta .suit-top { position: absolute; top: 22px; left: 8px; font-size: 0.9rem; }
        .karta.red { color: var(--danger); }
        .karta.zakryta { background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d); color: transparent; border-color: white; }

        .card-stack { position: relative; width: 90px; height: 130px; }
        
        #pick-menu, #target-menu { display: none; position: fixed; top: 10%; background: #1a1a2e; border: 4px solid var(--gold); padding: 30px; border-radius: 20px; z-index: 1000; width: 80%; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        button { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-start { background: #27ae60; color: white; }
        .btn-blef { background: var(--danger); color: white; }
        .btn-sks { background: var(--gold); }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>👥 GRACZE</h2>
        <div id="player-list"></div>
    </div>

    <div id="game-area">
        <h1>⚔️ MACHNOWIAK 2.0</h1>
        <div id="status" style="color:var(--gold); margin:10px;">Czekaj na start...</div>
        
        <div id="stół"></div>

        <div class="controls">
            <button id="start-btn" class="btn-start" onclick="socket.emit('start-game')">START GRY</button>
            <button class="btn-blef" onclick="socket.emit('check-blef')">SPRAWDZAM BLEF!</button>
            <button class="btn-sks">SKS!</button>
        </div>

        <div id="pick-menu">
            <h2 id="pick-title">Nagroda! Wybierz 2 karty:</h2>
            <div id="pick-cards-grid" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;"></div>
        </div>

        <div id="target-menu">
            <h2>🎯 Wybierz ofiarę:</h2>
            <div id="target-list" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <h3>TWOJA RĘKA:</h3>
        <div id="reka" style="display:flex; gap:10px; padding:20px; flex-wrap:wrap; justify-content:center;"></div>
    </div>

    <script>
        const socket = io();
        let selectedForPick = [];

        window.onload = () => {
            const nick = prompt("Twój Nick:");
            if(nick) socket.emit('join', nick);
        };

        socket.on('update-player-list', list => {
            document.getElementById('player-list').innerHTML = list.map(p => `
                <div class="player-card ${p.isCurrent ? 'active' : ''}">
                    <strong>${p.name}</strong><br>Karty: ${p.count}
                </div>
            `).join('');
        });

        socket.on('init-hand', hand => {
            const reka = document.getElementById('reka');
            reka.innerHTML = '';
            hand.forEach(k => {
                const div = createCardElement(k);
                div.onclick = () => socket.emit('play-card', k);
                reka.appendChild(div);
            });
        });

        function createCardElement(k) {
            const div = document.createElement('div');
            const isRed = k.suit === '♥' || k.suit === '♦';
            div.className = `karta ${isRed ? 'red' : ''}`;
            div.innerHTML = `<span class="val-top">${k.value}</span><span class="suit-top">${k.value === 'Joker' ? '🃏' : k.suit}</span>`;
            return div;
        }

        socket.on('show-pick-menu', data => {
            const menu = document.getElementById('pick-menu');
            const grid = document.getElementById('pick-cards-grid');
            document.getElementById('pick-title').innerText = data.title;
            menu.style.display = 'block';
            grid.innerHTML = '';
            selectedForPick = [];

            data.pool.forEach(k => {
                const div = createCardElement(k);
                div.onclick = () => {
                    if (div.style.transform === 'scale(1.1)') return; 
                    div.style.transform = 'scale(1.1)';
                    div.style.border = '3px solid gold';
                    selectedForPick.push(k);
                    if (selectedForPick.length === data.count) {
                        socket.emit('pick-finished', { pickedCards: selectedForPick, targetIdx: data.targetIdx });
                        menu.style.display = 'none';
                    }
                };
                grid.appendChild(div);
            });
        });

        socket.on('show-target-menu', targets => {
            const menu = document.getElementById('target-menu');
            const list = document.getElementById('target-list');
            menu.style.display = 'block';
            list.innerHTML = '';
            targets.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-sks';
                btn.innerText = t;
                btn.onclick = () => {
                    socket.emit('target-selected', t);
                    menu.style.display = 'none';
                };
                list.appendChild(btn);
            });
        });

        socket.on('reveal-detailed', data => {
            const stol = document.getElementById('stół');
            stol.innerHTML = '';
            data.forEach(p => {
                const stack = document.createElement('div');
                stack.className = 'card-stack';
                p.cards.forEach((c, i) => {
                    const cardDiv = createCardElement(c);
                    cardDiv.style.position = 'absolute';
                    cardDiv.style.top = (i * 25) + 'px';
                    cardDiv.style.left = (i * 5) + 'px';
                    stack.appendChild(cardDiv);
                });
                stack.innerHTML += `<div style="position:absolute; bottom:-40px; width:100%; text-align:center; font-size:0.8rem">${p.name}<br><b>${p.finalPower} pkt</b></div>`;
                stol.appendChild(stack);
            });
        });

        socket.on('update-status', msg => document.getElementById('status').innerText = msg);
        
        socket.on('card-placed', () => {
            const stol = document.getElementById('stół');
            const card = document.createElement('div');
            card.className = 'karta zakryta';
            stol.appendChild(card);
        });

        socket.on('game-begun', () => document.getElementById('start-btn').style.display = 'none');
    </script>
</body>
</html>
