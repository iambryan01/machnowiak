<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MACHNOWIAK 2.0 ULTIMATE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f0c29; --accent: #3498db; --gold: #f1c40f; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 220px; background: rgba(0,0,0,0.6); border-right: 2px solid var(--accent); padding: 20px; display: flex; flex-direction: column; }
        .player-card { background: rgba(255,255,255,0.05); padding: 10px; margin: 5px 0; border-radius: 8px; border-left: 4px solid transparent; }
        .player-card.active { border-left-color: var(--gold); background: rgba(241, 196, 15, 0.1); }
        .sks-used { font-size: 0.7rem; color: #888; }

        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; position: relative; }
        
        /* Punkt 6: Przycisk nowej gry */
        .btn-new-game { position: absolute; top: 10px; right: 10px; background: #8e44ad; color: white; padding: 8px 15px; font-size: 0.8rem; }

        /* Punkt 4: Stół i Stosy Kart */
        #stół { background: rgba(255,255,255,0.03); width: 90%; min-height: 350px; border-radius: 30px; border: 2px dashed #444; display: flex; justify-content: center; align-items: flex-start; gap: 60px; margin: 20px; padding-top: 60px; }

        .card-stack { position: relative; width: 90px; height: 200px; }
        .stack-info { position: absolute; top: -50px; width: 100%; text-align: center; color: var(--gold); font-weight: bold; line-height: 1.2; }

        .karta { 
            width: 90px; height: 130px; background: white; color: black; border-radius: 10px; 
            border: 2px solid #222; position: absolute; cursor: pointer; transition: 0.2s;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .karta .val-top { position: absolute; top: 5px; left: 8px; font-weight: 900; font-size: 1.2rem; }
        .karta .suit-top { position: absolute; top: 25px; left: 8px; font-size: 0.9rem; }
        .karta.red { color: var(--danger); }
        .karta.zakryta { background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d); color: transparent; border-color: white; }

        /* Punkt 4: Obniżenie kart w stosie, by nie zasłaniały góry */
        .karta:nth-child(2) { top: 45px; z-index: 2; }
        .karta:nth-child(3) { top: 90px; z-index: 3; }
        .karta:nth-child(4) { top: 135px; z-index: 4; }

        #pick-menu, #target-menu, #sks-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2e; border: 4px solid var(--gold); padding: 30px; border-radius: 20px; z-index: 2000; box-shadow: 0 0 100px rgba(0,0,0,0.9); text-align: center; }
        
        #pick-menu { width: 80%; max-height: 80vh; overflow-y: auto; }

        button { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        .btn-start { background: #27ae60; color: white; }
        .btn-blef { background: var(--danger); color: white; }
        .btn-sks { background: var(--gold); color: #000; }
        .btn-no { background: #7f8c8d; color: white; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>👥 GRACZE</h2>
        <div id="player-list"></div>
    </div>

    <div id="game-area">
        <button class="btn-new-game" onclick="socket.emit('new-game-request')">NOWA GRA (RESET)</button>
        <h1>⚔️ MACHNOWIAK 2.0</h1>
        <div id="status">Czekaj na start...</div>
        
        <div id="stół"></div>

        <div class="controls">
            <button id="start-btn" class="btn-start" onclick="socket.emit('start-game')">START GRY</button>
            <button class="btn-blef" onclick="socket.emit('check-blef')">SPRAWDZAM BLEF!</button>
        </div>

        <div id="sks-modal">
            <h2>🔥 SKS (Ostatnia Szansa)</h2>
            <p>Czy chcesz użyć SKS w tej turze?<br><small>Można użyć tylko RAZ na całą grę.</small></p>
            <button class="btn-sks" onclick="confirmSKS(true)">TAK, DAWAJ!</button>
            <button class="btn-no" onclick="confirmSKS(false)">NIE, CZEKAM</button>
        </div>

        <div id="pick-menu">
            <h2 id="pick-title">Nagroda! Wybierz 2 karty:</h2>
            <div id="pick-cards-grid" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;"></div>
        </div>

        <div id="target-menu">
            <h2>🎯 Wybierz ofiarę:</h2>
            <div id="target-list" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>

        <h3>TWOJA RĘKA:</h3>
        <div id="reka" style="display:flex; gap:10px; padding:20px; flex-wrap:wrap; justify-content:center;"></div>
    </div>

    <script>
        const socket = io();
        let selectedForPick = [];
        let mySksUsed = false;

        window.onload = () => {
            const nick = prompt("Twój Nick:");
            if(nick) socket.emit('join', nick);
        };

        socket.on('update-player-list', list => {
            document.getElementById('player-list').innerHTML = list.map(p => `
                <div class="player-card ${p.isCurrent ? 'active' : ''}">
                    <strong>${p.name}</strong><br>Karty: ${p.count}
                    ${p.sksUsed ? '<div class="sks-used">SKS zużyty</div>' : ''}
                </div>
            `).join('');
        });

        socket.on('init-hand', hand => {
            const reka = document.getElementById('reka');
            reka.innerHTML = '';
            hand.forEach(k => {
                const div = createCardElement(k);
                div.onclick = () => socket.emit('play-card', k);
                reka.appendChild(div);
            });
        });

        function createCardElement(k) {
            const div = document.createElement('div');
            const isRed = k.suit === '♥' || k.suit === '♦';
            div.className = `karta ${isRed ? 'red' : ''}`;
            div.innerHTML = `<span class="val-top">${k.value}</span><span class="suit-top">${k.value === 'Joker' ? '🃏' : k.suit}</span>`;
            return div;
        }

        // Punkt 5: Powiadomienie SKS
        socket.on('show-sks-modal', () => {
            if (!mySksUsed) {
                document.getElementById('sks-modal').style.display = 'block';
            }
        });

        function confirmSKS(choice) {
            if (choice) {
                socket.emit('use-sks');
                mySksUsed = true;
            }
            document.getElementById('sks-modal').style.display = 'none';
        }

        // Punkt 4: Wyświetlanie kart na stole (Nick na górze)
        socket.on('reveal-detailed', data => {
            const stol = document.getElementById('stół');
            stol.innerHTML = '';
            data.forEach(p => {
                const stack = document.createElement('div');
                stack.className = 'card-stack';
                
                // Info o graczu NAD kartami
                const info = document.createElement('div');
                info.className = 'stack-info';
                info.innerHTML = `${p.name}<br>${p.finalPower} pkt`;
                stack.appendChild(info);

                p.cards.forEach((c, i) => {
                    const cardDiv = createCardElement(c);
                    stack.appendChild(cardDiv);
                });
                stol.appendChild(stack);
            });
        });

        // Punkt 2: Pokazywanie kart z Buły
        socket.on('reveal-bula', bulaData => {
            let msg = "Karty dobrane w BUŁĘ:\n";
            bulaData.forEach(b => {
                msg += `${b.name}: ${b.cards.map(c => c.value + c.suit).join(', ')}\n`;
            });
            alert(msg); // Można to zmienić na ładniejszy div, ale alert gwarantuje, że każdy zauważy
        });

        socket.on('clear-table', () => {
            document.getElementById('stół').innerHTML = '';
            mySksUsed = false; // Reset przy nowej grze
        });

        socket.on('update-status', msg => document.getElementById('status').innerText = msg);

        socket.on('card-placed', data => {
            const stol = document.getElementById('stół');
            const card = document.createElement('div');
            card.className = 'karta zakryta';
            stol.appendChild(card);
        });

        socket.on('show-pick-menu', data => {
            const menu = document.getElementById('pick-menu');
            const grid = document.getElementById('pick-cards-grid');
            document.getElementById('pick-title').innerText = data.title;
            menu.style.display = 'block';
            grid.innerHTML = '';
            selectedForPick = [];
            data.pool.forEach(k => {
                const div = createCardElement(k);
                div.onclick = () => {
                    if (div.style.border.includes('gold')) return;
                    div.style.border = '4px solid gold';
                    div.style.transform = 'scale(1.05)';
                    selectedForPick.push(k);
                    if (selectedForPick.length === data.count) {
                        socket.emit('pick-finished', { pickedCards: selectedForPick, targetIdx: data.targetIdx });
                        menu.style.display = 'none';
                    }
                };
                grid.appendChild(div);
            });
        });

        socket.on('show-target-menu', targets => {
            const menu = document.getElementById('target-menu');
            const list = document.getElementById('target-list');
            menu.style.display = 'block';
            list.innerHTML = '';
            targets.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-sks';
                btn.innerText = t;
                btn.onclick = () => {
                    socket.emit('target-selected', t);
                    menu.style.display = 'none';
                };
                list.appendChild(btn);
            });
        });

        socket.on('game-begun', () => {
            document.getElementById('start-btn').style.display = 'none';
        });
    </script>
</body>
</html>
