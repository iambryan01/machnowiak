<!DOCTYPE html>
<html>
<head>
    <title>MACHNOWIAK 2.0</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; color: white; text-align: center; margin: 0; }
        #game-container { padding: 20px; }
        .karta { width: 70px; height: 100px; background: white; color: black; border-radius: 10px; display: inline-block; line-height: 100px; font-weight: bold; margin: 5px; cursor: pointer; border: 2px solid #333; transition: 0.2s; vertical-align: top; position: relative; }
        .karta:hover { transform: translateY(-15px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .red { color: #e74c3c; }
        #stół { min-height: 150px; border: 2px dashed #34495e; border-radius: 20px; margin: 20px auto; padding: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; max-width: 90%; background: rgba(0,0,0,0.2); }
        #status { font-size: 1.5em; color: #f1c40f; margin: 20px 0; height: 1.6em; }
        button { padding: 12px 25px; background: #e74c3c; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px #c0392b; }
        button:active { transform: translateY(2px); box-shadow: none; }
        #lista-graczy { position: fixed; right: 10px; top: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; text-align: left; }
    </style>
</head>
<body>
    <div id="lista-graczy"></div>
    <div id="game-container">
        <h1>🎴 MACHNOWIAK 2.0</h1>
        <div id="status">Łączenie...</div>
        <button id="start-btn" onclick="socket.emit('start-game')" style="background:#27ae60; box-shadow: 0 4px #1e8449;">START GRY</button>
        
        <h3>STÓŁ:</h3>
        <div id="stół"></div>

        <h3>TWOJA RĘKA:</h3>
        <div id="reka"></div>
        <br>
        <button onclick="socket.emit('check-blef')">SPRAWDZAM (BLEF)!</button>
    </div>

    <script>
        const socket = io();
        const nickname = prompt("Podaj nick:", "Gracz" + Math.floor(Math.random()*100));
        socket.emit('join', nickname);

        socket.on('init-hand', (hand) => {
            const rekaDiv = document.getElementById('reka');
            rekaDiv.innerHTML = '';
            hand.forEach(karta => {
                const div = document.createElement('div');
                div.className = `karta ${ (karta.suit === '♥' || karta.suit === '♦') ? 'red' : '' }`;
                div.innerText = karta.value + (karta.suit === 'Joker' ? '🃏' : karta.suit);
                div.onclick = () => socket.emit('play-card', karta);
                rekaDiv.appendChild(div);
            });
        });

        socket.on('update-status', msg => document.getElementById('status').innerText = msg);
        socket.on('game-begun', () => document.getElementById('start-btn').style.display = 'none');

        socket.on('new-card-on-table', data => {
            const stol = document.getElementById('stół');
            const div = document.createElement('div');
            div.className = `karta ${ (data.card.suit === '♥' || data.card.suit === '♦') ? 'red' : '' }`;
            div.innerHTML = `${data.card.value}${data.card.suit === 'Joker' ? '🃏' : data.card.suit}<br><small style="font-size:10px; position:absolute; bottom:5px; width:100%; left:0; line-height:1">${data.playerName}</small>`;
            stol.appendChild(div);
        });

        socket.on('clear-table', () => document.getElementById('stół').innerHTML = '');
        socket.on('blef-result', data => alert(data.msg));
        socket.on('update-players', list => {
            const div = document.getElementById('lista-graczy');
            div.innerHTML = '<strong>Gracze:</strong><br>' + list.map(p => `${p.name}: ${p.cards}`).join('<br>');
        });
        socket.on('error-msg', msg => alert(msg));
    </script>
</body>
</html>
