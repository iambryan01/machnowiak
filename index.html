<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MACHNOWIAK ONLINE 2.0</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; text-align: center; margin: 0; }
        #game-board { padding: 20px; max-width: 900px; margin: auto; }
        #status { font-size: 1.5em; color: #00d2ff; margin: 20px 0; min-height: 1.5em; }
        #stół { background: rgba(255,255,255,0.05); border: 3px dashed #16213e; border-radius: 20px; min-height: 160px; display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; padding: 15px; }
        .karta { width: 80px; height: 115px; background: #fff; color: #000; border-radius: 10px; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; font-size: 1.4em; cursor: pointer; border: 2px solid #333; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .red { color: #e94560; }
        .owner { font-size: 0.5em; position: absolute; bottom: 5px; color: #777; width: 100%; }
        #reka { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .controls { margin-top: 25px; display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; text-transform: uppercase; }
        #start-btn { background: #27ae60; color: white; }
        .btn-check { background: #e94560; color: white; }
        .btn-sks { background: #f1c40f; color: #1a1a2e; }
        #p-list { position: fixed; left: 15px; top: 15px; background: rgba(22, 33, 62, 0.9); padding: 10px; border-radius: 8px; text-align: left; font-size: 0.9em; border: 1px solid #00d2ff; }
    </style>
</head>
<body>
    <div id="p-list"><strong>GRACZE:</strong><div id="p-cont"></div></div>
    <div id="game-board">
        <h1>🎴 MACHNOWIAK 2.0</h1>
        <div id="status">Wpisz nick...</div>
        <div id="stół"></div>
        <div id="reka"></div>
        <div class="controls">
            <button id="start-btn" onclick="socket.emit('start-game')">START</button>
            <button class="btn-check" onclick="socket.emit('check-blef')">BLEF!</button>
            <button class="btn-sks" onclick="socket.emit('sks-action')">SKS!</button>
        </div>
    </div>
    <script>
        const socket = io();
        const nick = prompt("Twój nick:", "Gracz" + Math.floor(Math.random()*99));
        socket.emit('join', nick);
        socket.on('update-players', list => {
            document.getElementById('p-cont').innerHTML = list.map(p => `<div>${p.name}: ${p.cards}</div>`).join('');
        });
        socket.on('init-hand', hand => {
            const reka = document.getElementById('reka');
            reka.innerHTML = '';
            hand.forEach(k => {
                const el = document.createElement('div');
                el.className = `karta ${(k.suit === '♥' || k.suit === '♦') ? 'red' : ''}`;
                el.innerHTML = `${k.value}${k.suit === 'Joker' ? '🃏' : k.suit}`;
                el.onclick = () => socket.emit('play-card', k);
                reka.appendChild(el);
            });
        });
        socket.on('new-card-on-table', data => {
            const stol = document.getElementById('stół');
            const el = document.createElement('div');
            el.className = `karta ${(data.card.suit === '♥' || data.card.suit === '♦') ? 'red' : ''}`;
            el.innerHTML = `${data.card.value}${data.card.suit === 'Joker' ? '🃏' : data.card.suit}<div class="owner">${data.playerName}</div>`;
            stol.appendChild(el);
        });
        socket.on('update-status', msg => document.getElementById('status').innerText = msg);
        socket.on('clear-table', () => document.getElementById('stół').innerHTML = '');
        socket.on('blef-result', data => alert(data.msg));
        socket.on('game-begun', () => document.getElementById('start-btn').style.display = 'none');
        socket.on('error-msg', msg => alert(msg));
    </script>
</body>
</html>
