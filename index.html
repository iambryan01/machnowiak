<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACHNOWIAK 2.0 ULTIMATE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #0f0c29;
            --panel: rgba(255, 255, 255, 0.1);
            --accent: #3498db;
            --gold: #f1c40f;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        h1 { margin: 20px 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        #game-container { width: 95%; max-width: 1200px; text-align: center; }

        #deck-info { font-weight: bold; color: #bdc3c7; margin-bottom: 10px; }

        #status { 
            font-size: 1.2rem; 
            color: var(--gold); 
            background: rgba(0,0,0,0.3); 
            padding: 10px 20px; 
            border-radius: 50px; 
            margin-bottom: 20px;
            border: 1px solid var(--gold);
        }

        #stół { 
            background: var(--panel); 
            min-height: 250px; 
            border-radius: 20px; 
            border: 2px dashed var(--accent); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 30px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .karta { 
            width: 80px; 
            height: 120px; 
            background: white; 
            color: black; 
            border-radius: 12px; 
            display: inline-flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 1.5rem; 
            border: 3px solid #333; 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
            position: relative;
        }

        .karta:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .karta.red { color: var(--danger); }
        .karta.zakryta { background: linear-gradient(45deg, #2c3e50, #000); border-color: var(--accent); color: transparent; }

        #reka { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: wrap; 
            padding: 20px; 
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        .controls { margin: 20px 0; }
        
        button { 
            padding: 12px 30px; 
            font-size: 1rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: background 0.3s;
            margin: 5px;
        }

        #start-btn { background: #27ae60; color: white; }
        #start-btn:hover { background: #2ecc71; }

        #target-menu { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: #2c3e50; 
            padding: 30px; 
            border: 4px solid var(--gold); 
            z-index: 1000; 
            border-radius: 20px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .target-btn { 
            display: block; 
            width: 200px; 
            margin: 10px 0; 
            padding: 15px; 
            background: #e67e22; 
            color: white; 
            border: none; 
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .card-group { display: flex; flex-direction: column; align-items: center; }
        .player-label { font-size: 0.9rem; margin-top: 5px; color: var(--accent); }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>⚔️ MACHNOWIAK 2.0 ULTIMATE</h1>
        
        <div id="deck-info">Karty w talii: <span id="deck-count">53</span></div>
        <div id="status">Inicjalizacja... Połącz się z kolegą.</div>
        
        <div class="controls">
            <button id="start-btn" onclick="socket.emit('start-game')">START GRY</button>
        </div>

        <div id="stół">
            </div>

        <div id="target-menu">
            <h3>🎯 WYBIERZ OFIARĘ (BOGUŚ):</h3>
            <div id="target-list"></div>
        </div>

        <h3>TWOJA RĘKA:</h3>
        <div id="reka"></div>
    </div>

    <script>
        const socket = io();
        let myNick = "";

        // Logowanie
        window.onload = () => {
            myNick = prompt("Wpisz swój Nick:", "Gracz " + Math.floor(Math.random()*100));
            socket.emit('join', myNick);
        };

        // Aktualizacja stanu ręki
        socket.on('init-hand', hand => {
            const rekaDiv = document.getElementById('reka');
            rekaDiv.innerHTML = '';
            hand.forEach(k => {
                const div = document.createElement('div');
                const isRed = k.suit === '♥' || k.suit === '♦';
                div.className = `karta ${isRed ? 'red' : ''}`;
                div.innerHTML = `${k.value}${k.suit === 'Joker' ? '🃏' : k.suit}`;
                div.onclick = () => socket.emit('play-card', k);
                rekaDiv.appendChild(div);
            });
            // Aktualizacja licznika talii przy okazji
            document.getElementById('deck-count').innerText = 53 - (hand.length); // Uproszczone
        });

        // Ktoś rzucił kartę (zakryta)
        socket.on('card-placed', data => {
            const stol = document.getElementById('stół');
            const div = document.createElement('div');
            div.className = 'karta zakryta';
            div.innerHTML = '?';
            stol.appendChild(div);
        });

        // Odkrycie kart po turze
        socket.on('reveal-detailed', data => {
            const stol = document.getElementById('stół');
            stol.innerHTML = '';
            data.forEach(p => {
                const group = document.createElement('div');
                group.className = 'card-group';
                
                const cardsContainer = document.createElement('div');
                cardsContainer.style.display = 'flex';
                cardsContainer.style.gap = '5px';

                p.cards.forEach(c => {
                    const div = document.createElement('div');
                    const isRed = c.suit === '♥' || c.suit === '♦';
                    div.className = `karta ${isRed ? 'red' : ''}`;
                    div.innerHTML = `${c.value}${c.suit === 'Joker' ? '🃏' : c.suit}`;
                    cardsContainer.appendChild(div);
                });

                group.appendChild(cardsContainer);
                group.innerHTML += `<div class="player-label">${p.name}: <b>${p.finalPower} pkt</b></div>`;
                stol.appendChild(group);
            });
        });

        // Menu wyboru ofiary (Ósemka)
        socket.on('show-target-menu', targets => {
            const menu = document.getElementById('target-menu');
            const list = document.getElementById('target-list');
            menu.style.display = 'block';
            list.innerHTML = '';
            targets.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'target-btn';
                btn.innerText = t;
                btn.onclick = () => {
                    socket.emit('target-selected', t);
                    menu.style.display = 'none';
                };
                list.appendChild(btn);
            });
        });

        socket.on('update-status', msg => {
            document.getElementById('status').innerText = msg;
        });

        socket.on('game-begun', () => {
            document.getElementById('start-btn').style.display = 'none';
        });

        socket.on('clear-table', () => {
            document.getElementById('stół').innerHTML = '';
        });
    </script>
</body>
</html>
